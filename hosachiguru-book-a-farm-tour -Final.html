  .page {
    position: relative; z-index: 2;
    display: flex; align-items: flex-start; justify-content: center;
    min-height: 100vh; width: 100%; padding: 32px 16px;
  }
  .card {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    width: 100%; max-width: 520px;
    overflow: hidden;
  }
  .card-header {
    background: linear-gradient(135deg, #1a3c1a 0%, #2d5a27 100%);
    padding: 28px 36px 24px;
    text-align: center;
  }
  .logo-wrap { margin-bottom: 16px; }
  .logo-wrap img { height: 36px; width: auto; }
  .card-header h1 {
    color: #ffffff; font-size: 22px; font-weight: 700;
    letter-spacing: -0.3px; line-height: 1.3; margin-bottom: 6px;
  }
  .card-header p { color: rgba(255,255,255,0.78); font-size: 13px; line-height: 1.5; }
  .card-body { padding: 28px 36px 24px; }
  .section-label {
    font-size: 10.5px; font-weight: 700; letter-spacing: 1.1px;
    text-transform: uppercase; color: #2d5a27;
    margin-bottom: 14px; padding-bottom: 7px; border-bottom: 2px solid #e8f4e8;
