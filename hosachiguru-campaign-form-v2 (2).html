  .overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, rgba(26,60,46,0.7) 0%, rgba(0,0,0,0.5) 100%);
    z-index: 1;
  }
  .wrapper {
    position: relative;
    z-index: 2;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .card {
    background: rgba(255,255,255,0.97);
    border-radius: 20px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    width: 100%;
    max-width: 460px;
    overflow: hidden;
  }
  .card-header {
    background: linear-gradient(135deg, #1a3c2e 0%, #2d6a4f 100%);
    padding: 2rem 2.4rem 1.6rem;
    border-bottom: 3px solid #c9a84c;
    text-align: center;
  }
  .logo-wrap { margin-bottom: 1rem; }
  .logo-wrap img { height: 36px; width: auto; }
  .header-title {
    font-size: 1.45rem;
    font-weight: 700;
    color: #fff;
    line-height: 1.25;
    margin-bottom: 0.35rem;
  }
  .header-sub {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.6);
    font-weight: 300;
  }
  .card-body { padding: 1.8rem 2.4rem 2.2rem; }
  .section-label {
    font-size: 0.68rem;
    font-weight: 700;
    color: #2d6a4f;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 1rem;
  }
  .field-group { margin-bottom: 1.1rem; }
  label {
    display: block;
    font-size: 0.73rem;
    font-weight: 600;
    color: #6b7b6e;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.35rem;
  }
  label .req { color: #52b788; margin-left: 2px; }
  input[type="text"], input[type="email"], input[type="tel"], select, textarea {
    width: 100%;
    padding: 0.68rem 1rem;
    border: 1.5px solid #dde8e1;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    color: #1c1c1c;
    background: #fff;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: #52b788;
    box-shadow: 0 0 0 3px rgba(82,183,136,0.12);
  }
  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
